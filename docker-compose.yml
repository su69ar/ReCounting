services:
  recounting:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - LEAD_WEBHOOK_URL=${LEAD_WEBHOOK_URL}
        - LEAD_WEBHOOK_SECRET=${LEAD_WEBHOOK_SECRET}
        - INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN}
        - INSTAGRAM_ACCOUNT_ID=${INSTAGRAM_ACCOUNT_ID}
        - INSTAGRAM_REFRESH_SECRET=${INSTAGRAM_REFRESH_SECRET}
        - EMAIL_USER=${EMAIL_USER}
        - EMAIL_APP_PASSWORD=${EMAIL_APP_PASSWORD}
        - EMAIL_FROM=${EMAIL_FROM}
        - ADMIN_EMAIL=${ADMIN_EMAIL}
        - NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION=${NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION}
    container_name: recounting-app
    restart: unless-stopped
    ports:
      - "3103:3103"
    environment:
      - NODE_ENV=production
      - PORT=3103
      - LEAD_WEBHOOK_URL=${LEAD_WEBHOOK_URL}
      - LEAD_WEBHOOK_SECRET=${LEAD_WEBHOOK_SECRET}
      - INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN}
      - INSTAGRAM_ACCOUNT_ID=${INSTAGRAM_ACCOUNT_ID}
      - INSTAGRAM_REFRESH_SECRET=${INSTAGRAM_REFRESH_SECRET}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_APP_PASSWORD=${EMAIL_APP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION=${NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3103/robots.txt | grep -q 'Sitemap:' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - recounting-network

networks:
  recounting-network:
    driver: bridge
